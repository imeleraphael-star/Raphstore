<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettaglio Prodotto</title>
    <link rel="stylesheet" href="../css/styleDettagli.css">
</head>
<body>

<header>
    <div class="logo">
        <img src="../imagini/logo.png" alt="Electro Logo">
        <span>RaphStore</span>
    </div>

    <nav>
        <ul>
            <li><a href="Home.html">Home</a></li>
            <li><a href="Prodotti.html">Prodotti</a></li>
            <li><a href="contatti-assistenza.html">Contatti</a></li>
            <li id="userNav">
                <a href="Login-register.html">Login/Registrati</a>
            </li>
        </ul>
    </nav>


    <!-- ICONA CARRELLO -->
    <div class="cart-container">
        <a href="carrello.html" class="cart-icon">
            🛒 <span id="cart-count">0</span>
        </a>
    </div>
</header>


<div class="container">
    <div class="product-detail">
        <div class="product-images">
            <img id="productImage" src="" alt="Immagine prodotto">
        </div>

        <div class="product-info">
            <h1 id="productName"></h1>
            <p class="price" id="productPrice"></p>
            <p id="productShortDesc"></p>

            <div class="quantity">
                Quantità: <input type="number" value="1" min="1">
            </div>

            <a href="#" id= "btnAdd" class="btn-add">Aggiungi al carrello</a>
        </div>
    </div>

    <div class="product-details">
        <h2>Dettagli Prodotto</h2>
        <p id="productLongDesc"></p>
    </div>
</div>

<footer>
    <p>
        <a href="Home.html">Home</a> |
        <a href="Prodotti.html">Prodotti</a> |
        <a href="contatti-assistenza.html">Contatti</a> |
        <a href="Privacy e termini.html">Privacy</a>
    </p>
    <p>&copy; 2025 RaphStore - Tutti i diritti riservati</p>
</footer>

<script src="../JS/dettagli.js" defer></script>

<script src="../JS/Auth.js" defer></script>

</body>
</html>
